}

function saveDate(){
localStorage.setItem('plannerDate',JSON.stringify(data));

function render(){

<div><label>Status</label><select onchange="upd(${i},'status',this.value)">

<option ${p.status==='Review'?'selected':''}>Review</option>

</div>
<label>Title</label><input value="${p.title}" onchange="upd(${i},'title',this.value)">
<label>Copy</label><textarea rows="4" oninput="upd(${i},'copy',this.value)">${p.copy}</textarea>

<label>CTA</label><input value="${p.cta}" onchange="upd(${i},'cta',this.value)">
<label>Internal Notes</label><textarea onchange="upd(${i},'notes',this.value)">${p.notes}</textarea>
<p><button onclick="duplicatePost(${i})">Duplicate</button> <button onclick="deletePost(${i})">Delete</button></p>`;
wrap.appendChild(div);
});
}

function upd(i,k,v){data[select.value][i][k]=v;saveDate();render();}
function addPost(){
data[select.value].push({date:'',platform:'Meta',format:'Image',status:'Draft',title:'',copy:'',hashtags:'',cta:'',notes:''});
render();
}
function duplicatePost(i){
data[select.value].push(JSON.parse(JSON.stringify(data[select.value][i])));
render();
}
function download(name,text){
let a=document.createElement('a');
a.href=URL.createObjectURL(new Blob([text],{type:'text/plain'}));
a.download=name;a.click();
}
function exportMonth(){
let m=select.value;
download(m+'.txt',JSON.stringify(data[m],null,2));
}
function exportAll(){
download('planner-completo.txt',JSON.stringify(data,null,2));
}

function deletePost(i){
if(confirm('Delete this post?')){
data[select.value].splice(i,1);
